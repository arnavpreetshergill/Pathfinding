spring.application.name=offline-router
server.port=0

# PostgreSQL Connection
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:test4}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:admin}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool Settings
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Server Configuration
server.tomcat.max-http-post-size=10485760
server.tomcat.max-http-header-size=8192
server.servlet.session.timeout=1800
server.tomcat.connection-timeout=600000
server.connection-timeout=600000
spring.mvc.async.request-timeout=600000

# Logging
logging.level.root=INFO
logging.level.com.example.offline_router=DEBUG
logging.file.name=logs/routing-service.log
logging.file.max-size=10MB
logging.file.max-history=7
